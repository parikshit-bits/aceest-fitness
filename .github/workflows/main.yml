name: ACEest CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:

  # ── Job 1: Build & Lint ─────────────────────────────────────────────────────
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flake8 lint check
        run: flake8 app.py test_app.py --max-line-length=100

  # ── Job 2: Docker Build ─────────────────────────────────────────────────────
  docker-build:
    name: Docker Image Assembly
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aceest-fitness:${{ github.sha }} .

      - name: Verify image exists
        run: docker image inspect aceest-fitness:${{ github.sha }}

  # ── Job 3: Automated Tests inside Docker ────────────────────────────────────
  test-in-container:
    name: Automated Testing (Pytest in Docker)
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aceest-fitness:test .

      - name: Run Pytest inside container
        run: |
          docker run --rm aceest-fitness:test \
            python -m pytest test_app.py -v --tb=short